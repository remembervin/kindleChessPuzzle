name: Update Chess Puzzles

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch puzzles with solution
        run: |
          > puzzles.txt
      
          for i in {1..10}
          do
            RESPONSE=$(curl -s https://lichess.org/api/puzzle/next)
      
            PGN=$(echo "$RESPONSE" | jq -r '.game.pgn')
      
            THEME=$(echo "$RESPONSE" | jq -r '.puzzle.themes[]' | grep -i mate | head -n1)
            SOL=$(echo "$RESPONSE" | jq -r '.puzzle.solution | join(" ")')
      
            if [ ! -z "$THEME" ]; then
              GOAL=$(echo $THEME | sed 's/mateIn/Mate in /')
            else
              GOAL=""
            fi
      
            echo "$GOAL|$PGN|$SOL" >> puzzles.txt
          done
          echo "Saved puzzles:"
          cat puzzles.txt

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add puzzles.txt
          git commit -m "update puzzles $(date)" || echo "no changes"
          git push
