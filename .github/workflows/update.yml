name: Update Chess Puzzles

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch puzzles (PGN → simple FEN substitute)
        run: |
          > puzzles.txt

          for i in {1..10}
          do
            RESPONSE=$(curl -s https://lichess.org/api/puzzle/next)

            # Extract PGN moves
            PGN=$(echo "$RESPONSE" | jq -r '.game.pgn')

            # VERY IMPORTANT:
            # We store PGN instead of FEN (Kindle will replay moves)
            echo "$PGN" >> puzzles.txt
          done

          echo "Saved puzzles:"
          cat puzzles.txt

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add puzzles.txt
          git commit -m "update puzzles $(date)" || echo "no changes"
          git push
