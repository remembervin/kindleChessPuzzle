- name: Fetch and extract puzzles
  run: |
    > puzzles.txt

    for i in {1..10}
    do
      RESPONSE=$(curl -s https://lichess.org/api/puzzle/next)

      # Try multiple possible paths
      FEN=$(echo "$RESPONSE" | jq -r '.game.fen // .fen // empty')

      # Fallback: extract from PGN if needed
      if [ -z "$FEN" ]; then
        FEN=$(echo "$RESPONSE" | jq -r '.game.pgn' | grep -o 'FEN "[^"]*"' | cut -d'"' -f2)
      fi

      # Only append valid FEN
      if [ ! -z "$FEN" ]; then
        echo "$FEN" >> puzzles.txt
      fi
    done

    echo "Generated puzzles:"
    cat puzzles.txt
