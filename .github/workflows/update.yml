name: Update Chess Puzzles

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch puzzle
        run: |
          curl -s https://lichess.org/api/puzzle/next > puzzle.json
          cat puzzle.json

      - name: Extract FEN (robust)
        run: |
          FEN=$(jq -r '.game.fen // .fen // empty' puzzle.json)
          echo "FEN: $FEN"

          if [ -z "$FEN" ]; then
            echo "FEN extraction failed"
            exit 1
          fi

          echo "$FEN" > puzzles.txt

      - name: Show file content
        run: |
          echo "---- puzzles.txt ----"
          cat puzzles.txt

      - name: Commit & push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add puzzles.txt
          git commit -m "update puzzles $(date)" || echo "no changes"
          git push
