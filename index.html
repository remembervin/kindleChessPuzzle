<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kindle Chess Puzzle</title>

<style>
body { max-width:720px; margin:0 auto; font-family:sans-serif; text-align:center; }

#board {
  display:grid;
  grid-template-columns:repeat(8,1fr);
  border:2px solid #000;
}

.square { position:relative; }
.square::before { content:""; display:block; padding-top:100%; }

.square span {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:38px;
}

.light{background:#eee;}
.dark{background:#aaa;}

.whitePiece{opacity:1; text-shadow:0 0 1px black;}
.blackPiece{font-weight:bold;}

.selected{outline:3px solid black;}
.move{outline:3px dashed black;}
.capture{outline:4px solid black;}

button { margin:4px; font-size:16px; }
.piecePicker button{font-size:26px;}
</style>
</head>

<body>

<h2>Kindle Chess Puzzle</h2>
<div id="info">Setup Mode</div>
<div id="board"></div>

<button onclick="loadPuzzleFile()">Load Puzzles</button>
<button onclick="loadNextPuzzle()">Next Puzzle</button>

<button onclick="prevMove()">◀</button>
<button onclick="nextMove()">▶</button>

<div style="margin-top:30px;">
  <button onclick="startSolutionMode()">Show Solution</button>
</div>

<div id="promotion" style="display:none;"></div>

<!-- SETUP -->
<div id="setupControls" class="piecePicker">
White:
<button onclick="selectPiece('K')">♔</button>
<button onclick="selectPiece('Q')">♕</button>
<button onclick="selectPiece('R')">♖</button>
<button onclick="selectPiece('B')">♗</button>
<button onclick="selectPiece('N')">♘</button>
<button onclick="selectPiece('P')">♙</button>

<br>Black:
<button onclick="selectPiece('k')">♚</button>
<button onclick="selectPiece('q')">♛</button>
<button onclick="selectPiece('r')">♜</button>
<button onclick="selectPiece('b')">♝</button>
<button onclick="selectPiece('n')">♞</button>
<button onclick="selectPiece('p')">♟</button>

<br>
<button onclick="selectPiece('')">❌ Clear</button>
<br>

<button onclick="setTurn('white')">WTP</button>
<button onclick="setTurn('black')">BTP</button>
<button onclick="clearBoard()">Clear Board</button>

<button onclick="doneSetup()">Done</button>
</div>

<div style="margin-top:30px; padding-top:10px; border-top:1px solid #aaa;">
  <input id="pgnInput" placeholder="Paste PGN here" style="width:80%;">
  <br>
  <button onclick="loadPGN()">Load PGN Puzzle</button>
</div>

<!-- PLAY -->
<div id="playControls" style="display:none;">
  <button onclick="flipPieces()">Flip</button>

  <span style="margin-left:20px;">
    <button onclick="resetPuzzle()">Reset</button>
  </span>

  <span style="margin-left:20px;">
    <button onclick="backToSetup()">Edit Puzzle</button>
  </span>
</div>

<script>
const pieces = { r:'♜',n:'♞',b:'♝',q:'♛',k:'♚',p:'♟',R:'♖',N:'♘',B:'♗',Q:'♕',K:'♔',P:'♙'};

let initialBoard = null;
let initialTurn = 'white';
// let initialTurn = 'white';
let board=[], selected=null;
let setupMode=true;
let selectedPiece='';
let turn='white', flipped=false;
let puzzleGoal = "";

let enPassant=null, pendingPromotion=null;
let gameOver=false;

let solutionMoves = [];
let solutionIndex = 0;
let solutionMode = false;

let puzzleList = [];
let puzzleIndex = 0;

let moveHistory = [];
let historyIndex = -1;


/* INIT */
function initEmptyBoard(){
  board=[];
  for(let r=0;r<8;r++) board.push(['','','','','','','','']);
}

function initStandardBoard(){
  board=[
    ['r','n','b','q','k','b','n','r'],
    ['p','p','p','p','p','p','p','p'],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['','','','','','','',''],
    ['P','P','P','P','P','P','P','P'],
    ['R','N','B','Q','K','B','N','R']
  ];
}

function cloneBoard(b){
  return JSON.parse(JSON.stringify(b));
}

function loadPuzzleFile(){

  var xhr = new XMLHttpRequest();

  xhr.onreadystatechange = function(){
    if(xhr.readyState==4 && xhr.status==200){

      puzzleList = xhr.responseText.split("\n").filter(x=>x.trim());
      puzzleIndex = 0;

      loadNextPuzzle();
    }
  };

  xhr.open("GET", "puzzles.txt", true);
  xhr.send();
}

function loadNextPuzzle(){

  if(puzzleList.length===0) return;

  const raw = puzzleList[puzzleIndex];
  puzzleIndex = (puzzleIndex + 1) % puzzleList.length;

  document.getElementById('pgnInput').value = raw;
  loadPGN();
}

function loadPGN(){

	const raw = document.getElementById('pgnInput').value.trim();
	if(!raw) return;

	let parts = raw.split('|');

	let pgn = raw;
	solutionMoves = [];
	solutionIndex = 0;

	if(parts.length >= 2){
	  puzzleGoal = parts[0];
	  pgn = parts[1];
	}

	if(parts.length >= 3){
	  solutionMoves = parts[2].trim().split(' ');
	}

  initStandardBoard();
  turn = 'white';

  const moves = pgn
    .replace(/\d+\./g,'')   // remove move numbers
    .replace(/\+/g,'')      // remove check
    .replace(/#/g,'')       // remove mate
    .trim()
    .split(/\s+/);

  for(let move of moves){
    applyPGNMove(move);
  }

// RESET STATE (add here)
solutionMode = false;
solutionIndex = 0;

selected = null;
pendingPromotion = null;
enPassant = null;
gameOver = false;

setupMode = false;

  document.getElementById('setupControls').style.display='none';
  document.getElementById('playControls').style.display='block';

initialBoard = JSON.parse(JSON.stringify(board));
initialTurn = turn;

draw();

  moveHistory = [JSON.parse(JSON.stringify(board))];
  historyIndex = 0;
}

function castle(side){

  const row = (turn==='white') ? 7 : 0;

  if(side==='king'){
    board[row][6] = board[row][4];
    board[row][4] = '';
    board[row][5] = board[row][7];
    board[row][7] = '';
  } else {
    board[row][2] = board[row][4];
    board[row][4] = '';
    board[row][3] = board[row][0];
    board[row][0] = '';
  }

  turn = (turn==='white')?'black':'white';
}

function applyPGNMove(move){

  // Castling
  if(move === 'O-O'){ castle('king'); return; }
  if(move === 'O-O-O'){ castle('queen'); return; }

  let pieceType = 'p';
  let fromFile = null;
  let fromRank = null;

  // Piece type
  if(/[RNBQK]/.test(move[0])){
    pieceType = move[0].toLowerCase();
    move = move.slice(1);
  }

  // Capture
  const isCapture = move.includes('x');
  move = move.replace('x','');
  
  // ---------------- PROMOTION ----------------
	let promotionPiece = null;

	if(move.includes('=')){
	  const parts = move.split('=');
	  move = parts[0];               // e.g. "a1"
	  promotionPiece = parts[1].toLowerCase(); // "q"
	}

  // Extract disambiguation
  if(move.length === 3){
    if(isNaN(move[0])) fromFile = move[0];
    else fromRank = move[0];
    move = move.slice(1);
  }

  const target = move.slice(-2);

  const to = {
    r: 8 - parseInt(target[1]),
    c: target.charCodeAt(0) - 97
  };

  let candidates = [];

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){

      const p = board[r][c];
      if(!p) continue;

      if(turn==='white' && p!==p.toUpperCase()) continue;
      if(turn==='black' && p!==p.toLowerCase()) continue;

      if(p.toLowerCase() !== pieceType) continue;

      // file filter
      if(fromFile && c !== (fromFile.charCodeAt(0)-97)) continue;

      // rank filter
      if(fromRank && r !== (8 - parseInt(fromRank))) continue;

      if(isValidMoveStrict({r,c}, to)){
        candidates.push({r,c});
      }
    }
  }

  if(candidates.length >= 1){
    const from = candidates[0];
	let piece = board[from.r][from.c];

	if(promotionPiece){
	  piece = (turn==='white') ? promotionPiece.toUpperCase() : promotionPiece;
	}

	board[to.r][to.c] = piece;
	board[from.r][from.c] = '';	
	
    board[from.r][from.c] = '';
    turn = (turn==='white')?'black':'white';
  }
}

/* SETUP */
function selectPiece(p){ selectedPiece=p; }
function setTurn(t){ turn=t; draw(); }
function clearBoard(){ initEmptyBoard(); draw(); }

function doneSetup(){
  setupMode = false;

  document.getElementById('setupControls').style.display='none';
  document.getElementById('playControls').style.display='block';

  // SAVE puzzle snapshot
  initialBoard = JSON.parse(JSON.stringify(board));
  initialTurn = turn;

  selected = null;
  pendingPromotion = null;
  enPassant = null;
  gameOver = false;

  draw();
}

function prevMove(){
  if(historyIndex > 0){
    historyIndex--;
    board = JSON.parse(JSON.stringify(moveHistory[historyIndex]));
    draw();
  }
}

function nextMove(){
  if(historyIndex < moveHistory.length-1){
    historyIndex++;
    board = JSON.parse(JSON.stringify(moveHistory[historyIndex]));
    draw();
  }
}

function moveToUCI(from,to){
  return String.fromCharCode(97+from.c) + (8-from.r) +
         String.fromCharCode(97+to.c) + (8-to.r);
}

function isCheckmate(color){

  if(!isCheck(color)) return false;

  if(hasMoves(color)) return false;

  return true;
}

function isStalemate(color){

  if(isCheck(color)) return false;

  return !hasMoves(color);
}

/* DRAW */
function draw(){
  const el=document.getElementById('board');
  el.innerHTML='';

  let legalMoves=[];
  if(!setupMode && selected){
    legalMoves=getLegalMoves(selected);
  }

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){

      const sq=document.createElement('div');
      sq.className='square '+((r+c)%2?'dark':'light');

      const piece=board[r][c];

      if(piece){
        const cls=(piece===piece.toUpperCase())?'whitePiece':'blackPiece';
        let rot=flipped?' rotate(180deg)':'';
        sq.innerHTML='<span class="'+cls+'" style="transform:translate(-50%, -50%)'+rot+';">'+pieces[piece]+'</span>';
      } else {
        sq.innerHTML='<span></span>';
      }

      if(selected && selected.r===r && selected.c===c){
        sq.className+=' selected';
      }

      for(let m of legalMoves){
        if(m.r===r && m.c===c){
          if(isCaptureMove(selected,m)) sq.className+=' capture';
          else sq.className+=' move';
        }
      }

      sq.onclick=(()=>handleTap(r,c));
      el.appendChild(sq);
    }
  }

	let sideText = (turn === 'white') ? "White to play" : "Black to play";

	let msg = setupMode ? 
	  "Setup Mode ("+turn+")" : 
	  sideText;

	if(puzzleGoal){
	  msg = sideText + " | " + puzzleGoal;
	}

  if(!setupMode){
  
	if(isCheckmate(turn)){
	  msg = "Checkmate! " + (turn==='white'?'Black':'White') + " wins";
	  gameOver = true;
	}
	else if(isStalemate(turn)){
	  msg = "Stalemate! Draw";
	  gameOver = true;
	}
	else if(isCheck(turn)){
	  msg = "Check! " + msg;
	}
	}

  document.getElementById('info').textContent=msg;
}

function playSolutionMove(){

  if(solutionIndex >= solutionMoves.length) return;

  const move = solutionMoves[solutionIndex];

  if(!move || move.length < 4){
    console.log("Invalid solution move:", move);
    return;
  }

  const from = {
    c: move.charCodeAt(0)-97,
    r: 8 - parseInt(move[1])
  };

  const to = {
    c: move.charCodeAt(2)-97,
    r: 8 - parseInt(move[3])
  };

  if(!board[from.r][from.c]){
    console.log("No piece at:", move);
    return;
  }

  makeMove(from,to);

  solutionIndex++;
  turn = (turn==='white')?'black':'white';

  draw();

  setTimeout(playSolutionMove, 2000);
}

function startSolutionMode(){

  if(!initialBoard) return;

  // Reset to original puzzle
  board = JSON.parse(JSON.stringify(initialBoard));
  turn = initialTurn;

  solutionMode = true;
  solutionIndex = 0;

  draw();

  setTimeout(playSolutionMove, 2000);
}


/* INPUT */
function handleTap(r,c){

  if(setupMode){
    board[r][c]=selectedPiece;
    draw();
    return;
  }

  if(gameOver || pendingPromotion) return;

  const piece=board[r][c];

  if(!selected){
    if(piece && isOwnPiece(piece)) selected={r,c};
  } else {
    if(isValidMoveStrict(selected,{r,c}) && isLegalMove(selected,{r,c})){
      makeMove(selected,{r,c});
      if(!pendingPromotion) turn=(turn==='white')?'black':'white';
    }
    selected=null;
  }

  draw();
}

/* ENGINE */

function isOwnPiece(p){
  return (turn==='white')?(p===p.toUpperCase()):(p===p.toLowerCase());
}

function getLegalMoves(from){
  const moves=[];
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      if(isValidMoveStrict(from,{r,c}) && isLegalMove(from,{r,c})){
        moves.push({r,c});
      }
    }
  }
  return moves;
}

function isCaptureMove(from,to){
  const t=board[to.r][to.c];
  const p=board[from.r][from.c];
  return t && ((p===p.toUpperCase())!=(t===t.toUpperCase()));
}

function isValidMoveStrict(from,to){

  const piece = board[from.r][from.c];
  const target = board[to.r][to.c];

  // cannot capture own piece
  if(target && ((piece===piece.toUpperCase()) === (target===target.toUpperCase()))) return false;

  const dr = to.r - from.r;
  const dc = to.c - from.c;

  switch(piece.toLowerCase()){

    // ---------------- PAWN ----------------
    case 'p':
      let dir = (piece==='P') ? -1 : 1;

      // forward move
      if(dc===0 && !target){
        if(dr===dir) return true;

        // 2-step
        if(dr===2*dir && ((piece==='P' && from.r===6)||(piece==='p' && from.r===1))){
          if(!board[from.r+dir][from.c]) return true;
        }
      }

      // capture
	  if(Math.abs(dc)===1 && dr===dir){
		if(target) return true;

		// ✅ ADD THIS (en-passant)
		if(enPassant && to.r===enPassant.r && to.c===enPassant.c){
		  return true;
		}
	  }

      return false;

    // ---------------- ROOK ----------------
    case 'r':
      if(dr!==0 && dc!==0) return false;
      return pathClear(from.r,from.c,to.r,to.c);

    // ---------------- BISHOP ----------------
    case 'b':
      if(Math.abs(dr)!==Math.abs(dc)) return false;
      return pathClear(from.r,from.c,to.r,to.c);

    // ---------------- QUEEN ----------------
    case 'q':
      if(dr===0 || dc===0 || Math.abs(dr)===Math.abs(dc)){
        return pathClear(from.r,from.c,to.r,to.c);
      }
      return false;

    // ---------------- KNIGHT ----------------
    case 'n':
      return (Math.abs(dr)===2 && Math.abs(dc)===1) ||
             (Math.abs(dr)===1 && Math.abs(dc)===2);

    // ---------------- KING ----------------
    case 'k':
      return Math.abs(dr)<=1 && Math.abs(dc)<=1;
  }

  return false;
}

function isValidMove(from,to){
  const piece=board[from.r][from.c];
  const target=board[to.r][to.c];

  if(target && isOwnPiece(target)) return false;

  const dr=to.r-from.r, dc=to.c-from.c;

  switch(piece.toLowerCase()){
    case 'p':
      let dir=(piece==='P')?-1:1;
      if(dc===0 && !target && dr===dir) return true;
      if(dc===0 && !target && dr===2*dir &&
         ((piece==='P'&&from.r===6)||(piece==='p'&&from.r===1))) return true;
      if(Math.abs(dc)===1 && dr===dir){
        if(target) return true;
        if(enPassant && enPassant.r===to.r && enPassant.c===to.c) return true;
      }
      return false;

    case 'r': return dr===0||dc===0;
    case 'b': return Math.abs(dr)===Math.abs(dc);
    case 'q': return dr===0||dc===0||Math.abs(dr)===Math.abs(dc);
    case 'n': return (Math.abs(dr)===2&&Math.abs(dc)===1)||(Math.abs(dr)===1&&Math.abs(dc)===2);
    case 'k': return Math.abs(dr)<=1 && Math.abs(dc)<=1;
  }
  return false;
}

function isLegalMove(from,to){

  const temp = cloneBoard(board);
  let piece = temp[from.r][from.c];

  // ---------------- EN PASSANT ----------------
  if(piece.toLowerCase()==='p' && enPassant &&
     to.r===enPassant.r && to.c===enPassant.c){

    // remove captured pawn
    temp[from.r][to.c] = '';
  }

  // ---------------- MOVE ----------------
  temp[to.r][to.c] = piece;
  temp[from.r][from.c] = '';

  // ---------------- PROMOTION ----------------
  if(piece === 'P' && to.r === 0){
    temp[to.r][to.c] = 'Q'; // assume queen (strongest)
  }
  if(piece === 'p' && to.r === 7){
    temp[to.r][to.c] = 'q';
  }

  const color = (piece === piece.toUpperCase()) ? 'white' : 'black';

  return !isCheck(color, temp);
}

function hasMoves(color){

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){

      const p = board[r][c];
      if(!p) continue;

      if(color==='white' && p!==p.toUpperCase()) continue;
      if(color==='black' && p!==p.toLowerCase()) continue;

      for(let r2=0;r2<8;r2++){
        for(let c2=0;c2<8;c2++){

          if(isValidMoveStrict({r,c},{r:r2,c:c2})){

            if(isLegalMove({r,c},{r:r2,c:c2})){
              return true; // at least one escape exists
            }
          }
        }
      }
    }
  }

  return false;
}

function isCheck(color,b=board){
  let king;
  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      if(b[r][c]===(color==='white'?'K':'k')) king={r,c};
    }
  }
	if(!king) return false; // safety (prevents crash)
	return isSquareAttacked(king.r,king.c,color==='white'?'black':'white',b);
}

function isSquareAttacked(r,c,byColor,b){
  for(let i=0;i<8;i++){
    for(let j=0;j<8;j++){
      const p=b[i][j]; if(!p) continue;
      const isWhite=p===p.toUpperCase();
      if((byColor==='white'&&!isWhite)||(byColor==='black'&&isWhite)) continue;

      const dr=r-i, dc=c-j;

      switch(p.toLowerCase()){
        case 'p':
          let dir=isWhite?-1:1;
          if(dr===dir && Math.abs(dc)===1) return true;
          break;
        case 'n':
          if((Math.abs(dr)===2&&Math.abs(dc)===1)||(Math.abs(dr)===1&&Math.abs(dc)===2)) return true;
          break;
        case 'b':
          if(Math.abs(dr)===Math.abs(dc) && pathClear(i,j,r,c,b)) return true;
          break;
        case 'r':
          if((dr===0||dc===0) && pathClear(i,j,r,c,b)) return true;
          break;
        case 'q':
          if(((dr===0||dc===0)||Math.abs(dr)===Math.abs(dc)) && pathClear(i,j,r,c,b)) return true;
          break;
        case 'k':
          if(Math.abs(dr)<=1 && Math.abs(dc)<=1) return true;
          break;
      }
    }
  }
  return false;
}

function pathClear(r1,c1,r2,c2,b=board){

  let dr = Math.sign(r2 - r1);
  let dc = Math.sign(c2 - c1);

  let r = r1 + dr;
  let c = c1 + dc;

  while(r !== r2 || c !== c2){
    if(b[r][c]) return false;
    r += dr;
    c += dc;
  }

  return true;
}

function makeMove(from,to){
  let piece=board[from.r][from.c];

  if(piece.toLowerCase()==='p' && enPassant &&
     to.r===enPassant.r && to.c===enPassant.c){
    board[from.r][to.c]='';
  }

  board[to.r][to.c]=piece;
  board[from.r][from.c]='';

  if(piece==='P' && to.r===0){ triggerPromotion(to,'white'); return; }
  if(piece==='p' && to.r===7){ triggerPromotion(to,'black'); return; }

  enPassant=null;
  if(piece.toLowerCase()==='p' && Math.abs(to.r-from.r)===2){
    enPassant={ r:(from.r+to.r)/2, c:from.c };
  }
  
  moveHistory = moveHistory.slice(0, historyIndex + 1);
  moveHistory.push(JSON.parse(JSON.stringify(board)));
  historyIndex++;
}

/* PROMOTION */
function triggerPromotion(pos,color){
  pendingPromotion={pos,color};
  const el=document.getElementById('promotion');
  el.innerHTML='Promote:<br>';
  ['q','r','b','n'].forEach(opt=>{
    let piece=(color==='white')?opt.toUpperCase():opt;
    let btn=document.createElement('button');
    btn.textContent=pieces[piece];
    btn.onclick=()=>applyPromotion(piece);
    el.appendChild(btn);
  });
  el.style.display='block';
}

function applyPromotion(piece){
  const pos=pendingPromotion.pos;
  board[pos.r][pos.c]=piece;
  pendingPromotion=null;
  document.getElementById('promotion').style.display='none';
  turn=(turn==='white')?'black':'white';
  draw();
}

function resetPuzzle(){

  if(!initialBoard){
    alert("No puzzle saved yet. Press Done first.");
    return;
  }

  board = JSON.parse(JSON.stringify(initialBoard));
  turn = initialTurn;

  selected = null;
  pendingPromotion = null;
  enPassant = null;
  gameOver = false;

  draw();
}

function backToSetup(){

  if(initialBoard){
    board = JSON.parse(JSON.stringify(initialBoard));
    turn = initialTurn;
  }

  setupMode = true;

  document.getElementById('setupControls').style.display='block';
  document.getElementById('playControls').style.display='none';

  selected = null;
  pendingPromotion = null;
  enPassant = null;
  gameOver = false;

  draw();
}

/* UTIL */
function flipPieces(){ flipped=!flipped; draw(); }

initEmptyBoard();
draw();
</script>

</body>
</html>
